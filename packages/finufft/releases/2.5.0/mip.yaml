name: finufft
version: "2.5.0"
description: "FINUFFT nonuniform FFT"
homepage: "https://finufft.readthedocs.io"
repository: "https://github.com/flatironinstitute/finufft"
license: "Apache-2.0"
dependencies: []

defaults:
  symbol_extensions: [".m", ".js"]
  addpaths:
    - path: "matlab/numbl"
    - path: "matlab"

builds:
  - architectures: [linux_x86_64, macos_x86_64, windows_x86_64]
    release_number: 1
    compile_script: compile.m
  - architectures: [numbl_wasm]
    release_number: 1
    build_script: matlab/numbl/build_wasm.sh
    build_env:
      FINUFFT_SRC: .
  - architectures: [numbl_linux_x86_64, numbl_macos_x86_64]
    release_number: 1
    build_script: matlab/numbl/build_native.sh
    build_env:
      FINUFFT_SRC: .
